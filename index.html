<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>revorm · urenregistratie</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1D3557">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="revorm uren">
<style>
:root{
  /* Revorm-huisstijl */
  --accent:#C8102E; --accent-d:#A00D24; --accent-l:#FAE7EA;
  --navy:#1D3557; --navy-d:#152740; --navy-l:#E7ECF3; --cream:#F5F1E8; --gold:#F4BE2C; --gold-d:#8A6D10;
  --bg:#FBFAF5; --card:#ffffff; --line:#E7E2D9; --line2:#EFEAE1;
  --txt:#111111; --muted:#8A7D73; --wknd:#FAF7F1; --ok:#1D7A4D; --danger:#C8102E;
  --soft:#F1EDE4; --soft-d:#E7E2D9; --thead:#F7F3EC;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;}
header{background:var(--card);border-bottom:1px solid var(--line);padding:14px 22px;display:flex;align-items:center;gap:18px;position:sticky;top:0;z-index:10;}
.brand{display:flex;align-items:center;gap:11px;}
.brand .logo{height:24px;width:auto;display:block;}
.brand .sub-brand{color:var(--muted);font-weight:500;font-size:14px;letter-spacing:-.2px;}
nav{display:flex;gap:4px;margin-left:8px;}
nav button{background:none;border:none;padding:8px 14px;border-radius:8px;font-size:14px;color:var(--muted);cursor:pointer;font-weight:500;}
nav button.active{background:var(--accent-l);color:var(--accent-d);}
nav button:hover:not(.active){background:var(--soft);}
main{max-width:1100px;margin:22px auto;padding:0 22px 60px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:18px;}
h2{margin:0 0 4px;font-size:17px;color:var(--navy);}
.sub{color:var(--muted);margin:0 0 16px;font-size:13px;}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
.btn{background:var(--accent);color:#fff;border:none;padding:9px 15px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;}
.btn:hover{background:var(--accent-d);}
.btn.ghost{background:var(--soft);color:var(--txt);}
.btn.ghost:hover{background:var(--soft-d);}
.btn.sm{padding:5px 10px;font-size:12.5px;border-radius:7px;}
.btn.danger{background:#fff;color:var(--danger);border:1px solid #f3c9c9;}
.btn.danger:hover{background:#fdf0f0;}
.pill{font-weight:600;padding:6px 12px;background:var(--accent-l);color:var(--accent-d);border-radius:8px;min-width:230px;text-align:center;}
input[type=text],input[type=number],input[type=month],select{font-family:inherit;font-size:14px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--txt);}
input:focus,select:focus{outline:2px solid var(--accent-l);border-color:var(--accent);}
table{border-collapse:collapse;width:100%;}
.grid th,.grid td{border:1px solid var(--line2);padding:0;text-align:center;}
.grid thead th{background:var(--thead);font-size:12px;color:var(--muted);font-weight:600;padding:8px 6px;}
.grid thead th.wknd,.grid td.wknd{background:var(--wknd);}
.grid .namecol{text-align:left;padding:10px 12px;min-width:220px;font-weight:500;}
.grid thead th.namecol{font-size:13px;}
.client-row td{background:var(--accent-l);color:var(--accent-d);font-weight:700;text-align:left;padding:8px 12px;font-size:13px;}
.day-cell input{width:100%;border:none;text-align:center;padding:11px 2px;background:transparent;font-size:14px;border-radius:0;}
.day-cell input:focus{outline:2px solid var(--accent);outline-offset:-2px;background:var(--accent-l);}
.rowtot,.daytot{font-weight:600;background:var(--thead);padding:10px 8px;min-width:64px;}
.totrow td{border-top:2px solid var(--line);font-weight:700;padding:11px 8px;background:var(--soft-d);}
.grand{color:var(--accent-d);}
.rep th,.rep td{border-bottom:1px solid var(--line2);padding:9px 12px;text-align:left;}
.rep th{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;}
.rep td.num,.rep th.num{text-align:right;font-variant-numeric:tabular-nums;}
.rep .clienthead td{background:var(--accent-l);color:var(--accent-d);font-weight:700;}
.rep .subtot td{font-weight:600;background:var(--thead);}
.rep .total td{font-weight:700;border-top:2px solid var(--line);font-size:15px;}
.muted{color:var(--muted);}
.empty{text-align:center;color:var(--muted);padding:34px;}
.mgmt-client{border:1px solid var(--line);border-radius:11px;padding:14px 16px;margin-bottom:14px;}
.mgmt-client h3{margin:0 0 10px;font-size:15px;display:flex;align-items:center;gap:10px;}
.proj-line{display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px solid var(--line2);}
.proj-line .pn{flex:1;font-weight:500;}
.proj-line.arch .pn{color:var(--muted);text-decoration:line-through;}
.addrow{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:12px;color:var(--muted);font-weight:600;}
.note{background:#FEF6E0;border:1px solid #F4BE2C;color:#6A6258;padding:10px 14px;border-radius:9px;font-size:12.5px;margin-bottom:16px;}
.tag{font-size:11px;background:var(--soft);color:var(--muted);padding:2px 7px;border-radius:5px;font-weight:600;}
.right{margin-left:auto;}
.hide{display:none;}
.syncchip{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;padding:5px 11px;border-radius:999px;background:var(--soft);color:var(--muted);}
.syncchip .dot{width:8px;height:8px;border-radius:50%;background:#9ca3af;flex:none;}
.syncchip.ok{background:#ecfdf5;color:#047857;} .syncchip.ok .dot{background:#10b981;}
.syncchip.sync{background:var(--accent-l);color:var(--accent-d);} .syncchip.sync .dot{background:var(--accent);animation:pulse 1s infinite;}
.syncchip.off{background:#fff7ed;color:#9a3412;} .syncchip.off .dot{background:#f59e0b;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.account{font-size:13px;color:var(--muted);}
.account b{color:var(--txt);}
.headsync{margin-left:8px;}

/* Weekraster: horizontaal scrollen met vaste (plakkende) projectkolom */
.gridwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.grid .namecol{position:sticky;left:0;z-index:2;background:var(--card);}
.grid thead th.namecol{z-index:3;background:var(--thead);}
.grid .client-row td.namecol{background:var(--accent-l);z-index:2;}
.grid thead th{min-width:52px;}
/* Verlof- en auto-rij */
.grid .leave-row td.namecol{color:var(--gold-d);box-shadow:inset 3px 0 0 var(--gold),1px 0 0 var(--line2);}
.grid .leave-row input{color:var(--gold-d);font-weight:600;}
.grid .car-row td{background:var(--thead);padding:9px 2px;}
.grid .car-row td.namecol{font-weight:600;}
.grid .car-row input[type=checkbox]{width:20px;height:20px;cursor:pointer;accent-color:var(--navy);margin:0;}
/* Weekoverzicht in navy i.p.v. het rode accent */
.pill{background:var(--navy-l);color:var(--navy);}
.grid .client-row td{background:var(--navy-l);color:var(--navy);}
.grid .client-row td.namecol{background:var(--navy-l);}
.grand{color:var(--navy);}
.day-cell input:focus{outline-color:var(--navy);background:var(--navy-l);}
/* Contract-uren */
.budget{padding:10px 0;border-top:1px solid var(--line2);}
.budget:first-of-type{border-top:none;}
.budget-head{display:flex;align-items:center;gap:10px;margin-bottom:6px;font-size:13px;flex-wrap:wrap;}
.budget-head .over{color:var(--danger);font-weight:700;}
.bar{height:9px;background:var(--soft-d);border-radius:999px;overflow:hidden;}
.bar-fill{height:100%;background:var(--accent);border-radius:999px;transition:width .3s;}
.bar-fill.over{background:var(--danger);}
.bsm{font-size:12px;}
.budget-avg{margin-top:4px;font-size:13px;color:var(--accent-d);background:var(--accent-l);border-radius:7px;padding:6px 10px;display:inline-block;}
.budget-avg.muted{color:var(--muted);background:var(--soft);}
.done-head{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin:14px 0 4px;}
.done-head .muted{font-weight:500;text-transform:none;letter-spacing:0;}
.contract{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);}
.contract-lbl{font-size:12px;color:var(--muted);font-weight:600;display:block;margin-bottom:6px;}
.leave-total{font-size:16px;margin:4px 0 0;}

/* Safe-area (notch / home-indicator) voor standalone PWA op iPhone */
@supports(padding:max(0px)){
  header{padding-left:max(22px,env(safe-area-inset-left));padding-right:max(22px,env(safe-area-inset-right));}
  main{padding-bottom:max(60px,env(safe-area-inset-bottom));}
}

/* Mobiel (iPhone): smalle vaste projectkolom, ruime dagen, geen invoer-zoom */
@media (max-width:640px){
  header{padding:10px 14px;gap:10px;flex-wrap:wrap;}
  .brand{font-size:16px;}
  nav{order:3;flex:1 1 100%;margin-left:0;gap:3px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  nav button{padding:8px 12px;white-space:nowrap;}
  .headsync{order:2;}
  main{margin:14px auto;padding:0 12px 40px;}
  .card{padding:14px;border-radius:12px;}
  input[type=text],input[type=number],input[type=month],input[type=date],select{font-size:16px;}
  .grid .namecol{min-width:104px;max-width:130px;padding:8px;font-size:12.5px;box-shadow:2px 0 4px -2px rgba(0,0,0,.12);}
  .grid thead th.namecol{font-size:12px;}
  .grid thead th{min-width:46px;font-size:11px;}
  .day-cell input{font-size:16px;padding:12px 1px;}
  .toolbar{gap:8px;}
  .pill{min-width:0;flex:1 1 100%;order:-1;font-size:13px;}
  .btn{padding:10px 14px;}
  .rep th,.rep td{padding:8px 8px;}
}
</style>
</head>
<body>
<header>
  <div class="brand">
    <svg class="logo" viewBox="0 0 150 38" role="img" aria-label="revorm">
      <text x="1" y="28" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="31" font-weight="800" letter-spacing="-1.6" fill="#111111">revorm</text>
      <rect x="3" y="32.5" width="66" height="4.2" rx="2.1" fill="#C8102E"/>
    </svg>
    <span class="sub-brand">urenregistratie</span>
  </div>
  <nav id="nav">
    <button data-tab="week" class="active">Weekoverzicht</button>
    <button data-tab="rapport">Rapportage</button>
    <button data-tab="beheer">Beheer</button>
  </nav>
  <span class="right syncchip headsync" id="headSync" title="Synchronisatiestatus"><span class="dot"></span><span id="headSyncText">Lokaal</span></span>
</header>
<main>
  <section id="tab-week" class="tab"></section>
  <section id="tab-rapport" class="tab hide"></section>
  <section id="tab-beheer" class="tab hide"></section>
</main>
<script>
"use strict";

/* ---------- State & persistence ---------- */
const STORE_KEY = "revorm_uren_v1";
const DAYNAMES = ["maandag","dinsdag","woensdag","donderdag","vrijdag","zaterdag","zondag"];
const DAYABBR  = ["ma","di","wo","do","vr","za","zo"];
const MONTHS   = ["januari","februari","maart","april","mei","juni","juli","augustus","september","oktober","november","december"];

let state = loadState();

function defaultState(){
  return {
    settings:{ consultant:"revorm", kvk:"", manager:"" },
    clients:[],   // {id,name, budget?:{hours,start:"YYYY-MM-DD",end:"YYYY-MM-DD"}}
    projects:[],  // {id,clientId,name,rate(number|null),archived}
    entries:{},   // "projId|YYYY-MM-DD": hours(number)
    leave:{},     // "YYYY-MM-DD": hours(number)  — verlof, niet klant-gebonden
    car:{}        // "YYYY-MM-DD": true            — auto gebruikt op die dag
  };
}
function normalizeState(s){
  s = s || {};
  return Object.assign(defaultState(), s, {settings:Object.assign(defaultState().settings, s.settings||{})});
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return defaultState();
    return normalizeState(JSON.parse(raw));
  }catch(e){ return defaultState(); }
}
/* Schrijft alleen naar de browser (lokale kopie / offline). */
function saveLocal(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
  catch(e){ alert("Let op: lokaal opslaan is mislukt. Maak een JSON-backup via Beheer."); }
}
/* Bewaart lokaal én plant een cloud-synchronisatie (indien aangemeld). */
function save(){
  saveLocal();
  if(typeof scheduleCloudFlush === "function") scheduleCloudFlush();
}

/* Hooks voor de sync-laag (sync.js) */
function getState(){ return state; }
function setState(s){ state = normalizeState(s); }
function stateIsEmpty(){
  return state.clients.length===0 && state.projects.length===0 && Object.keys(state.entries).length===0;
}
function rerenderAll(){ show(currentTab); }

/* Sync-/login-status in de UI */
let syncStatusText = "Lokaal", syncStatusKind = "";
let msAccount = null;
function setSyncStatus(text, kind){
  syncStatusText = text; syncStatusKind = kind || "";
  const chip = document.getElementById("headSync");
  const txt = document.getElementById("headSyncText");
  if(txt) txt.textContent = text;
  if(chip) chip.className = "right syncchip headsync " + syncStatusKind;
  const bTxt = document.getElementById("beheerSyncText");
  const bChip = document.getElementById("beheerSyncChip");
  if(bTxt) bTxt.textContent = text;
  if(bChip) bChip.className = "syncchip " + syncStatusKind;
}
function updateAuthUI(account){
  msAccount = account || null;
  if(currentTab === "beheer") renderBeheer();
}

function uid(){ return "id"+Math.random().toString(36).slice(2,9); }

/* ---------- Date helpers (local, Monday-first) ---------- */
function pad(n){ return n<10?"0"+n:""+n; }
function keyOf(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function startOfWeek(d){
  const x=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const wd=(x.getDay()+6)%7; // 0=Mon
  x.setDate(x.getDate()-wd);
  return x;
}
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function weekDates(monday){ return Array.from({length:7},(_,i)=>addDays(monday,i)); }
function isoWeek(d){
  const x=new Date(d.getFullYear(),d.getMonth(),d.getDate());
  const day=(x.getDay()+6)%7;
  x.setDate(x.getDate()-day+3);
  const firstThu=new Date(x.getFullYear(),0,4);
  const fday=(firstThu.getDay()+6)%7;
  firstThu.setDate(firstThu.getDate()-fday+3);
  return 1+Math.round((x-firstThu)/(7*86400000));
}

/* ---------- Number formatting ---------- */
function fmtH(n){ return n.toLocaleString("nl-NL",{maximumFractionDigits:2}); }
function fmtEur(n){ return n.toLocaleString("nl-NL",{style:"currency",currency:"EUR"}); }
function parseH(v){
  if(v==null) return 0;
  const s=(""+v).trim().replace(",",".").replace(/[^0-9.]/g,"");
  if(s==="") return 0;
  const n=parseFloat(s);
  return isNaN(n)||n<0?0:n;
}

/* ---------- Lookups ---------- */
function clientName(id){ const c=state.clients.find(c=>c.id===id); return c?c.name:"(onbekend)"; }
function projectsOf(id,includeArch){ return state.projects.filter(p=>p.clientId===id && (includeArch||!p.archived)); }
function getEntry(pid,k){ return state.entries[pid+"|"+k]||0; }
function setEntry(pid,k,h){
  const key=pid+"|"+k;
  if(h>0) state.entries[key]=h; else delete state.entries[key];
}
function monthHours(pid,year,month){ // month 0-based
  let t=0, pref=pid+"|"+year+"-"+pad(month+1)+"-";
  for(const k in state.entries){ if(k.indexOf(pref)===0) t+=state.entries[k]; }
  return t;
}
function dayHours(pid,k){ return getEntry(pid,k); }

/* ---------- Verlof (niet klant-gebonden) ---------- */
function getLeave(k){ return state.leave[k]||0; }
function setLeave(k,h){ if(h>0) state.leave[k]=h; else delete state.leave[k]; }
function leaveYearTotal(year){
  let t=0, pref=year+"-";
  for(const k in state.leave){ if(k.indexOf(pref)===0) t+=state.leave[k]; }
  return t;
}
function weekHasLeave(monday){ return weekDates(monday).some(d=>getLeave(keyOf(d))>0); }

/* ---------- Auto-gebruik per dag ---------- */
function getCar(k){ return !!state.car[k]; }
function setCar(k,on){ if(on) state.car[k]=true; else delete state.car[k]; }

/* ---------- Contract-uren per klant ---------- */
// Som van alle (ook gearchiveerde) klant-uren binnen [startISO,endISO] inclusief.
function clientUsedHours(clientId, startISO, endISO){
  let total=0;
  const pids=state.projects.filter(p=>p.clientId===clientId).map(p=>p.id);
  const pset=new Set(pids);
  for(const k in state.entries){
    const bar=k.indexOf("|"); if(bar<0) continue;
    const pid=k.slice(0,bar), date=k.slice(bar+1);
    if(!pset.has(pid)) continue;
    if(startISO && date<startISO) continue;
    if(endISO && date>endISO) continue;
    total+=state.entries[k];
  }
  return total;
}

/* ===================================================================
   XLSX engine — builds a real .xlsx (zip of XML) in the browser.
   Styles index (s=):
   0 default      1 bold          2 header(white/indigo)
   3 bordered     4 bordered num  5 bordered bold
   6 bordered bold num  7 title    8 bordered center
   9 subheader    10 bordered eur 11 bordered bold eur  12 fill bold
   =================================================================== */
function crc32(bytes){
  let crc=-1;
  for(let i=0;i<bytes.length;i++){
    let c=(crc^bytes[i])&0xff;
    for(let k=0;k<8;k++) c=c&1?(0xEDB88320^(c>>>1)):(c>>>1);
    crc=(crc>>>8)^c;
  }
  return (crc^-1)>>>0;
}
function buildZip(files){
  const enc=new TextEncoder(), parts=[], central=[]; let offset=0;
  const push=a=>{ parts.push(a); offset+=a.length; };
  for(const f of files){
    const name=enc.encode(f.name), data=f.data, crc=crc32(data), loc=offset;
    const h=new Uint8Array(30+name.length), dv=new DataView(h.buffer);
    dv.setUint32(0,0x04034b50,true); dv.setUint16(4,20,true); dv.setUint16(6,0x0800,true);
    dv.setUint16(8,0,true); dv.setUint16(10,0,true); dv.setUint16(12,0,true);
    dv.setUint32(14,crc,true); dv.setUint32(18,data.length,true); dv.setUint32(22,data.length,true);
    dv.setUint16(26,name.length,true); dv.setUint16(28,0,true); h.set(name,30);
    push(h); push(data);
    const c=new Uint8Array(46+name.length), cd=new DataView(c.buffer);
    cd.setUint32(0,0x02014b50,true); cd.setUint16(4,20,true); cd.setUint16(6,20,true);
    cd.setUint16(8,0x0800,true); cd.setUint16(10,0,true); cd.setUint16(12,0,true); cd.setUint16(14,0,true);
    cd.setUint32(16,crc,true); cd.setUint32(20,data.length,true); cd.setUint32(24,data.length,true);
    cd.setUint16(28,name.length,true); cd.setUint32(42,loc,true); c.set(name,46);
    central.push(c);
  }
  const cdStart=offset; let cdSize=0;
  for(const c of central){ push(c); cdSize+=c.length; }
  const e=new Uint8Array(22), ed=new DataView(e.buffer);
  ed.setUint32(0,0x06054b50,true); ed.setUint16(8,central.length,true); ed.setUint16(10,central.length,true);
  ed.setUint32(12,cdSize,true); ed.setUint32(16,cdStart,true); push(e);
  let total=0; for(const p of parts) total+=p.length;
  const out=new Uint8Array(total); let o=0;
  for(const p of parts){ out.set(p,o); o+=p.length; }
  return out;
}
function xesc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function colName(n){ let s=""; n++; while(n>0){ const m=(n-1)%26; s=String.fromCharCode(65+m)+s; n=Math.floor((n-1)/26);} return s; }

const STYLES_XML='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
'<styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">'+
'<numFmts count="2"><numFmt numFmtId="164" formatCode="&quot;€&quot;\\ #,##0.00"/><numFmt numFmtId="165" formatCode="0.00"/></numFmts>'+
'<fonts count="5">'+
'<font><sz val="11"/><name val="Calibri"/></font>'+
'<font><b/><sz val="11"/><name val="Calibri"/></font>'+
'<font><b/><sz val="11"/><color rgb="FFFFFFFF"/><name val="Calibri"/></font>'+
'<font><b/><sz val="16"/><color rgb="FF312E81"/><name val="Calibri"/></font>'+
'<font><b/><sz val="12"/><name val="Calibri"/></font>'+
'</fonts>'+
'<fills count="4">'+
'<fill><patternFill patternType="none"/></fill>'+
'<fill><patternFill patternType="gray125"/></fill>'+
'<fill><patternFill patternType="solid"><fgColor rgb="FF4F46E5"/><bgColor indexed="64"/></patternFill></fill>'+
'<fill><patternFill patternType="solid"><fgColor rgb="FFE0E7FF"/><bgColor indexed="64"/></patternFill></fill>'+
'</fills>'+
'<borders count="2">'+

// cell helpers: t(text,style) / n(number,style) / blank
function t(v,s){ return {t:"s",v:v==null?"":v,s:s||0}; }
function num(v,s){ return {t:"n",v:v,s:s||0}; }
function sheetXml(sh){
  let cols="";
  if(sh.cols&&sh.cols.length){
    cols="<cols>";
    sh.cols.forEach((w,i)=>{ if(w) cols+='<col min="'+(i+1)+'" max="'+(i+1)+'" width="'+w+'" customWidth="1"/>'; });
    cols+="</cols>";
  }
  let body="";
  sh.rows.forEach((row,ri)=>{
    let cells="";
    row.forEach((c,ci)=>{
      if(c==null) return;
      const ref=colName(ci)+(ri+1), sa=c.s?' s="'+c.s+'"':"";
      if(c.t==="n") cells+='<c r="'+ref+'"'+sa+'><v>'+c.v+'</v></c>';
      else cells+='<c r="'+ref+'"'+sa+' t="inlineStr"><is><t xml:space="preserve">'+xesc(c.v)+'</t></is></c>';
    });
    body+='<row r="'+(ri+1)+'">'+cells+'</row>';
  });
  let merges="";
  if(sh.merges&&sh.merges.length){
    merges='<mergeCells count="'+sh.merges.length+'">';
    sh.merges.forEach(m=>{ merges+='<mergeCell ref="'+colName(m.sc)+(m.sr+1)+':'+colName(m.ec)+(m.er+1)+'"/>'; });
    merges+="</mergeCells>";
  }
  return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'+
    '<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">'+
    '<sheetViews><sheetView workbookViewId="0"/></sheetViews>'+
    '<sheetFormatPr defaultRowHeight="15"/>'+cols+
    '<sheetData>'+body+'</sheetData>'+merges+'</worksheet>';
}
function safeSheetName(n){ return (n||"Blad").replace(/[\\\/\?\*\[\]:]/g,"-").slice(0,31); }
function buildWorkbook(sheets){
  const enc=new TextEncoder();
  let sheetTags="", rels="", overrides="";
  sheets.forEach((sh,i)=>{
    const rid="rId"+(i+1);
    sheetTags+='<sheet name="'+xesc(safeSheetName(sh.name))+'" sheetId="'+(i+1)+'" r:id="'+rid+'"/>';
    rels+='<Relationship Id="'+rid+'" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet'+(i+1)+'.xml"/>';
    overrides+='<Override PartName="/xl/worksheets/sheet'+(i+1)+'.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>';
  });
  const stylesRid="rId"+(sheets.length+1);
  rels+='<Relationship Id="'+stylesRid+'" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>';
  const files=[];
  files.push({name:"[Content_Types].xml",data:enc.encode('<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>'+overrides+'</Types>')});
  files.push({name:"_rels/.rels",data:enc.encode('<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>')});
  files.push({name:"xl/workbook.xml",data:enc.encode('<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets>'+sheetTags+'</sheets></workbook>')});
  files.push({name:"xl/_rels/workbook.xml.rels",data:enc.encode('<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'+rels+'</Relationships>')});
  files.push({name:"xl/styles.xml",data:enc.encode(STYLES_XML)});
  sheets.forEach((sh,i)=>{ files.push({name:"xl/worksheets/sheet"+(i+1)+".xml",data:enc.encode(sheetXml(sh))}); });
  return buildZip(files);
}
function downloadBytes(name,bytes,mime){
  const blob=new Blob([bytes],{type:mime||"application/octet-stream"});
  const url=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=url; a.download=name; document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); },100);
}
function downloadXlsx(name,sheets){
  downloadBytes(name,buildWorkbook(sheets),"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet");
}

function wireWeekNav(){
  const p=el("wkPrev"),n=el("wkNext"),t=el("wkToday"),al=el("wkAddLeave");
  if(p) p.onclick=()=>{ curMonday=addDays(curMonday,-7); renderWeek(); };
  if(n) n.onclick=()=>{ curMonday=addDays(curMonday,7); renderWeek(); };
  if(t) t.onclick=()=>{ curMonday=startOfWeek(new Date()); renderWeek(); };
  if(al) al.onclick=()=>{ leaveWeeks.add(keyOf(curMonday)); renderWeek(); };
}
function recalcWeek(){
  const days=weekDates(curMonday), root=el("tab-week");
  const dayTot=[0,0,0,0,0,0,0]; let grand=0;
  root.querySelectorAll("[data-rowtot]").forEach(cell=>{
    const pid=cell.dataset.rowtot; let rt=0;
    days.forEach((d,i)=>{ const h=getEntry(pid,keyOf(d)); rt+=h; dayTot[i]+=h; });
    cell.textContent=rt?fmtH(rt):"0"; grand+=rt;
  });
  days.forEach((d,i)=>{ const c=root.querySelector('[data-daytot="'+i+'"]'); if(c) c.textContent=dayTot[i]?fmtH(dayTot[i]):"0"; });
  const g=root.querySelector("[data-grand]"); if(g) g.textContent=grand?fmtH(grand)+" u":"0";
  // Verlof telt NIET mee in de facturabele dag-/weektotalen — eigen regeltotaal.
  const lt=root.querySelector("[data-leavetot]");
  if(lt){ let s=0; days.forEach(d=>s+=getLeave(keyOf(d))); lt.textContent=s?fmtH(s):"0"; }
  const ct=root.querySelector("[data-cartot]");
  if(ct){ let n=0; days.forEach(d=>{ if(getCar(keyOf(d))) n++; }); ct.textContent=n?n+"×":"0"; }
}
function escapeHtml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function monthLabel(ym){ const [y,m]=ym.split("-").map(Number); return MONTHS[m-1]+" "+y; }
function fmtDateNL(iso){ if(!iso) return "…"; const [y,m,d]=iso.split("-"); return (+d)+"-"+(+m)+"-"+y; }
function reportRows(ym, clientId){
  const [y,m]=ym.split("-").map(Number);
  const out=[];
  state.clients.forEach(c=>{
    if(clientId && c.id!==clientId) return;
    const projs=projectsOf(c.id,true).map(p=>({p,uren:monthHours(p.id,y,m-1)})).filter(x=>x.uren>0);
    if(projs.length) out.push({client:c,projs});
  });
  return out;
}
/* Saldo + gemiddeld nog te schrijven uren per week tot de einddatum. */
function contractPace(b, used){
  const remaining=b.hours-used;
  if(!b.end) return {remaining, weeks:null, avg:null, ended:false};
  const today=new Date(); today.setHours(0,0,0,0);
  const start=b.start ? new Date(b.start+"T00:00:00") : today;
  const ref=start>today ? start : today;            // tel werkbare weken vanaf vandaag (of contractstart)
  const end=new Date(b.end+"T00:00:00");
  const days=Math.floor((end-ref)/86400000)+1;       // vandaag t/m einddag inclusief
  if(days<=0) return {remaining, weeks:0, avg:null, ended:true};
  const weeks=days/7;
  return {remaining, weeks, avg:remaining/weeks, ended:false};
}
function renderRapport(){
  const yy=Number(repMonth.split("-")[0]);
  const data=reportRows(repMonth, repClient||null);
  let grandU=0,grandB=0,anyRate=false;
  data.forEach(g=>g.projs.forEach(x=>{ grandU+=x.uren; if(x.p.rate){ anyRate=true; grandB+=x.uren*x.p.rate; }}));

  let html="";

  /* Contract-uren per klant (alleen klanten met een afgesproken maximum) */
  const bc=state.clients.filter(c=>c.budget && c.budget.hours>0);
  if(bc.length){
    html+=`<div class="card"><h2>Contract-uren</h2>
      <p class="sub">Geschreven uren binnen de afgesproken contractperiode per opdrachtgever.</p>`;
    bc.forEach(c=>{
      const b=c.budget, used=clientUsedHours(c.id,b.start,b.end);
      const pct=b.hours>0?Math.min(100,Math.round(used/b.hours*100)):0;
      const over=used>b.hours;
      const pace=over?null:contractPace(b,used);
      let avgHtml="";
      if(pace){
        if(pace.avg!=null) avgHtml=`<div class="budget-avg">≈ <b>${fmtH(Math.round(pace.avg*10)/10)} u/week</b> te schrijven t/m ${fmtDateNL(b.end)} <span class="muted">(${fmtH(Math.round(pace.weeks*10)/10)} weken, ${fmtH(pace.remaining)} u saldo)</span></div>`;
        else if(pace.ended) avgHtml=`<div class="budget-avg muted">Contractperiode verlopen — ${fmtH(pace.remaining)} u resterend</div>`;
        else avgHtml=`<div class="budget-avg muted">Stel een einddatum in voor het wekelijks gemiddelde.</div>`;
      }
      html+=`<div class="budget">
        <div class="budget-head"><b>${escapeHtml(c.name)}</b>
          <span class="muted bsm">${fmtDateNL(b.start)} – ${fmtDateNL(b.end)}</span>

        <div class="bar"><div class="bar-fill ${over?"over":""}" style="width:${pct}%"></div></div>
        <div class="muted bsm">${over?("⚠ "+fmtH(used-b.hours)+" u boven het afgesproken maximum"):(fmtH(b.hours-used)+" u resterend van "+fmtH(b.hours)+" u")}</div>
        ${avgHtml}
      </div>`;
    });
    html+=`</div>`;
  }

  /* Maandsamenvatting */
  html+=`<div class="card">
    <h2>Rapportage</h2>
    <p class="sub">Gewerkte uren per project — basis voor je facturen in Snelstart.</p>
    <div class="toolbar">
      <div class="field"><label>Maand</label><input type="month" id="repMonth" value="${repMonth}"></div>
      <div class="field"><label>Opdrachtgever</label><select id="repClient">
        <option value="">Alle opdrachtgevers</option>
        ${state.clients.map(c=>`<option value="${c.id}" ${c.id===repClient?"selected":""}>${escapeHtml(c.name)}</option>`).join("")}
      </select></div>
      <button class="btn right" id="repAllXlsx">Alle uren incl. auto (Excel)</button>
      <button class="btn ghost" id="repXlsx">Maandoverzicht (Excel)</button>
    </div>`;

  if(data.length===0){
    html+=`<div class="empty">Geen uren geregistreerd in ${monthLabel(repMonth)}${repClient?" voor "+escapeHtml(clientName(repClient)):""}.</div>`;
  }else{
    html+=`<table class="rep"><thead><tr><th>Project</th><th class="num">Uren</th><th class="num">Tarief</th><th class="num">Bedrag</th></tr></thead><tbody>`;
    data.forEach(g=>{
      let cu=0,cb=0;
      html+=`<tr class="clienthead"><td>${escapeHtml(g.client.name)}</td><td colspan="3"></td></tr>`;
      g.projs.forEach(x=>{
        cu+=x.uren; const b=x.p.rate?x.uren*x.p.rate:null; if(b) cb+=b;
        html+=`<tr><td>${escapeHtml(x.p.name)}</td><td class="num">${fmtH(x.uren)}</td>
          <td class="num">${x.p.rate?fmtEur(x.p.rate):"—"}</td>
          <td class="num">${b!=null?fmtEur(b):"—"}</td></tr>`;
      });
      html+=`<tr class="subtot"><td>Subtotaal ${escapeHtml(g.client.name)}</td><td class="num">${fmtH(cu)}</td><td></td><td class="num">${cb?fmtEur(cb):"—"}</td></tr>`;

    html+=`<tr class="total"><td>Totaal ${monthLabel(repMonth)}</td><td class="num">${fmtH(grandU)}</td><td></td><td class="num">${anyRate?fmtEur(grandB):"—"}</td></tr>`;

  el("tab-rapport").innerHTML=html;
  wireRapport();

function wireRapport(){
  const m=el("repMonth"); if(m) m.onchange=()=>{ repMonth=m.value||repMonth; renderRapport(); };
  const c=el("repClient"); if(c) c.onchange=()=>{ repClient=c.value; renderRapport(); };
  const x=el("repXlsx"); if(x) x.onclick=exportMaand;

function exportMaand(){
  const data=reportRows(repMonth, repClient||null);
  if(data.length===0){ alert("Geen uren in deze maand om te exporteren."); return; }
  const rows=[];
  rows.push([t("Urenoverzicht — "+monthLabel(repMonth),7)]);
  rows.push([t("Consultant: "+(state.settings.consultant||"revorm"))]);
  rows.push([]);
  rows.push([t("Opdrachtgever",2),t("Project",2),t("Uren",2),t("Tarief",2),t("Bedrag",2)]);
  let gu=0,gb=0;
  data.forEach(g=>{
    let cu=0,cb=0;
    g.projs.forEach(x=>{
      const b=x.p.rate?x.uren*x.p.rate:null; cu+=x.uren; if(b)cb+=b;
      rows.push([t(g.client.name,3),t(x.p.name,3),num(x.uren,4),x.p.rate?num(x.p.rate,10):t("",3),b!=null?num(b,10):t("",3)]);
    });

  });
  rows.push([]);
  rows.push([t("Totaal",5),t("",5),num(gu,6),t("",5),gb?num(gb,11):t("",5)]);
  const sheet={name:monthLabel(repMonth),cols:[26,30,10,12,14],rows:rows,
    merges:[{sr:0,sc:0,er:0,ec:4}]};
  downloadXlsx("revorm_uren_"+repMonth+".xlsx",[sheet]);

  out.push([t("Datum",2),t("Dag",2),t("Opdrachtgever",2),t("Project",2),t("Uren",2),t("Tarief",2),t("Bedrag",2),t("Auto",2)]);

  let tu=0, tb=0, dataRows=0;
  for(let d=1; d<=daysInMonth; d++){
    const date=new Date(y,m-1,d), k=keyOf(date);
    const dayLabel=d+"-"+m+"-"+y, dn=DAYNAMES[(date.getDay()+6)%7];
    const auto=getCar(k)?"Ja":"";
    state.clients.forEach(c=>{
      if(filter && c.id!==filter) return;
      projectsOf(c.id,true).forEach(p=>{
        const h=getEntry(p.id,k); if(h<=0) return;
        const amt=p.rate?h*p.rate:null; tu+=h; if(amt) tb+=amt; dataRows++;
        out.push([t(dayLabel,8),t(dn,3),t(c.name,3),t(p.name,3),num(h,4),
          p.rate?num(p.rate,10):t("",3), amt!=null?num(amt,10):t("",3), t(auto,8)]);
      });
    });
  }

  // Verlof onderaan (alleen bij 'alle opdrachtgevers'; verlof is niet klant-gebonden)
  const lvRows=[]; let lv=0;
  if(!filter){
    for(let d=1; d<=daysInMonth; d++){
      const date=new Date(y,m-1,d), k=keyOf(date), h=getLeave(k);
      if(h>0){ lv+=h; lvRows.push([t(d+"-"+m+"-"+y,8),t(DAYNAMES[(date.getDay()+6)%7],3),t("Verlof",3),t("",3),num(h,4),t("",3),t("",3),t("",3)]); }
    }
  }

  if(dataRows===0 && lvRows.length===0){ alert("Geen uren in deze maand om te exporteren."); return; }

  out.push([t("Totaal",5),t("",5),t("",5),t("",5),num(tu,6),t("",5),tb?num(tb,11):t("",5),t("",5)]);
  if(lvRows.length){
    out.push([]);
    out.push([t("Verlof",9)]);
    lvRows.forEach(r=>out.push(r));
    out.push([t("Totaal verlof",5),t("",5),t("",5),t("",5),num(lv,6),t("",5),t("",5),t("",5)]);
  }

  const cols=[12,11,24,26,9,11,13,8];
  const sheet={name:monthLabel(repMonth),cols:cols,rows:out,merges:[{sr:0,sc:0,er:0,ec:7}]};
  const fn="revorm_alle_uren_"+repMonth+(filter?"_"+clientName(filter).replace(/[^a-z0-9]+/gi,"_"):"")+".xlsx";
  downloadXlsx(fn,[sheet]);
}

/* ===================================================================
   BEHEER (clients, projects, settings, backup)
   =================================================================== */
function renderBeheer(){
  const s=state.settings;
  const signedIn = !!msAccount;
  const who = signedIn ? (msAccount.name || msAccount.username || "aangemeld") : "";
  let html=`
  <div class="card">
    <h2>Synchronisatie &amp; back-up</h2>
    <p class="sub">Meld je aan met je Microsoft 365-account om je uren automatisch op te slaan in je eigen OneDrive en te synchroniseren tussen je iPhone en laptop.</p>
    <div class="toolbar">
      <span class="syncchip ${syncStatusKind}" id="beheerSyncChip"><span class="dot"></span><span id="beheerSyncText">${escapeHtml(syncStatusText)}</span></span>
      ${signedIn
        ? `<span class="account right">Aangemeld als <b>${escapeHtml(who)}</b></span>`
        : `<span class="right"></span>`}
    </div>
    <div class="addrow">
      ${signedIn
        ? `<button class="btn" data-act="syncNow">Nu synchroniseren</button>
           <button class="btn ghost" data-act="msSignout">Afmelden</button>`
        : `<button class="btn" data-act="msSignin">Aanmelden bij Microsoft</button>`}
    </div>
    <div class="note">Je data staat veilig in je eigen OneDrive (map <b>Apps/revorm urenregistratie</b>) met automatische versiegeschiedenis. De knoppen hieronder blijven beschikbaar als extra handmatige back-up.</div>
    <div class="addrow">
      <button class="btn ghost" data-act="exportJson">Back-up downloaden (JSON)</button>
      <button class="btn ghost" data-act="importJson">Back-up importeren</button>
      <button class="btn danger right" data-act="wipe">Alles wissen</button>
      <input type="file" id="importFile" accept="application/json,.json" class="hide">
    </div>
  </div>

  <div class="card">
    <h2>Opdrachtgevers &amp; projecten</h2>
    <p class="sub">Beheer je opdrachtgevers en de projecten waarop je uren schrijft. Een tarief is optioneel (alleen voor rapportage).</p>
    <div class="addrow">
      <input type="text" id="newClient" placeholder="Naam nieuwe opdrachtgever" style="min-width:260px">
      <button class="btn" data-act="addClient">+ Opdrachtgever</button>
    </div>`;

  if(state.clients.length===0){
    html+=`<div class="empty">Nog geen opdrachtgevers.</div>`;
  }
  const projLine=p=>`<div class="proj-line ${p.archived?"arch":""}">
    <span class="pn">${escapeHtml(p.name)}</span>
    <span class="tag">${p.rate?fmtEur(p.rate)+"/u":"geen tarief"}</span>
    <button class="btn ghost sm" data-act="editProj" data-id="${p.id}">Bewerken</button>
    <button class="btn ghost sm" data-act="archProj" data-id="${p.id}">${p.archived?"Heropenen":"Afronden"}</button>
    <button class="btn danger sm" data-act="delProj" data-id="${p.id}">Verwijderen</button>
  </div>`;
  state.clients.forEach(c=>{
    const b=c.budget||{};
    html+=`<div class="mgmt-client">
      <h3>${escapeHtml(c.name)}
        <button class="btn ghost sm" data-act="renameClient" data-id="${c.id}">Hernoemen</button>
        <button class="btn danger sm right" data-act="delClient" data-id="${c.id}">Verwijderen</button>
      </h3>`;
    const all=projectsOf(c.id,true);
    const active=all.filter(p=>!p.archived), done=all.filter(p=>p.archived);
    if(all.length===0) html+=`<div class="muted" style="padding:6px 0">Nog geen projecten.</div>`;
    active.forEach(p=>{ html+=projLine(p); });
    if(done.length){
      html+=`<div class="done-head">Afgerond <span class="muted">(uit weekoverzicht, blijft in rapportage)</span></div>`;
      done.forEach(p=>{ html+=projLine(p); });
    }
    html+=`<div class="addrow">
        <input type="text" data-newproj="${c.id}" placeholder="Naam nieuw project" style="min-width:220px">
        <input type="text" data-newrate="${c.id}" placeholder="Tarief €/u (optioneel)" style="width:160px">
        <button class="btn ghost" data-act="addProj" data-id="${c.id}">+ Project</button>
      </div>
      <div class="contract">
        <label class="contract-lbl">Contract-uren (optioneel — toont voortgang in Rapportage)</label>
        <div class="addrow">
          <input type="text" inputmode="decimal" data-budhours="${c.id}" value="${b.hours||""}" placeholder="Max uren" style="width:120px">
          <div class="field"><label>vanaf</label><input type="date" data-budstart="${c.id}" value="${b.start||""}"></div>
          <div class="field"><label>t/m</label><input type="date" data-budend="${c.id}" value="${b.end||""}"></div>
          <button class="btn ghost sm" data-act="saveBudget" data-id="${c.id}">Opslaan</button>
        </div>
      </div></div>`;
  });
  html+=`</div>`;
  el("tab-beheer").innerHTML=html;
}

document.getElementById("tab-beheer").addEventListener("click",e=>{
  const b=e.target.closest("[data-act]"); if(!b) return;
  const act=b.dataset.act, id=b.dataset.id;
  if(act==="msSignin"){ if(typeof msSignIn==="function") msSignIn(); }
  else if(act==="msSignout"){ if(typeof msSignOut==="function") msSignOut(); }
  else if(act==="syncNow"){ if(typeof msSyncNow==="function") msSyncNow(); }
  else if(act==="addClient"){
    const v=el("newClient").value.trim(); if(!v) return;
    state.clients.push({id:uid(),name:v}); save(); renderBeheer();
  }
  else if(act==="renameClient"){
    const c=state.clients.find(x=>x.id===id); const v=prompt("Nieuwe naam opdrachtgever:",c.name);
    if(v&&v.trim()){ c.name=v.trim(); save(); renderBeheer(); }
  }
  else if(act==="delClient"){
    const projs=projectsOf(id,true);
    if(!confirm("Opdrachtgever en "+projs.length+" project(en) inclusief geregistreerde uren verwijderen?")) return;
    projs.forEach(p=>deleteProjectData(p.id));
    state.clients=state.clients.filter(x=>x.id!==id); save(); renderBeheer();
  }
  else if(act==="addProj"){
    const ni=document.querySelector('[data-newproj="'+id+'"]'), ri=document.querySelector('[data-newrate="'+id+'"]');
    const v=ni.value.trim(); if(!v) return;
    const rate=parseH(ri.value);
    state.projects.push({id:uid(),clientId:id,name:v,rate:rate>0?rate:null,archived:false});
    save(); renderBeheer();
  }
  else if(act==="editProj"){
    const p=state.projects.find(x=>x.id===id);
    const nm=prompt("Projectnaam:",p.name); if(nm===null) return;
    const rt=prompt("Tarief €/u (leeg = geen):",p.rate||"");
    if(nm.trim()) p.name=nm.trim();
    const r=parseH(rt); p.rate=r>0?r:null;
    save(); renderBeheer();
  }
  else if(act==="archProj"){
    const p=state.projects.find(x=>x.id===id); p.archived=!p.archived; save(); renderBeheer();
  }
  else if(act==="delProj"){
    if(!confirm("Project en alle geregistreerde uren verwijderen?")) return;
    deleteProjectData(id);
    state.projects=state.projects.filter(x=>x.id!==id); save(); renderBeheer();
  }
  else if(act==="saveBudget"){
    const c=state.clients.find(x=>x.id===id);
    const hrs=parseH(document.querySelector('[data-budhours="'+id+'"]').value);
    const st=document.querySelector('[data-budstart="'+id+'"]').value;
    const en=document.querySelector('[data-budend="'+id+'"]').value;
    if(hrs>0) c.budget={hours:hrs,start:st||"",end:en||""}; else delete c.budget;
    save(); flash(b,"Opgeslagen ✓");
  }
  else if(act==="exportJson"){
    const data=JSON.stringify(state,null,2);
    downloadBytes("revorm_backup_"+keyOf(new Date())+".json",new TextEncoder().encode(data),"application/json");
  }
  else if(act==="importJson"){ el("importFile").click(); }
  else if(act==="wipe"){
    if(!confirm("ALLE gegevens wissen? Maak eerst een back-up. Dit kan niet ongedaan worden gemaakt.")) return;
    state=defaultState(); save(); renderBeheer();
  }
});
document.getElementById("tab-beheer").addEventListener("change",e=>{
  if(e.target.id!=="importFile") return;
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const s=JSON.parse(r.result);
      if(!s.clients||!s.projects||!s.entries) throw 0;
      if(!confirm("Back-up importeren? Dit vervangt je huidige gegevens.")) return;
      state=normalizeState(s);
      save(); renderBeheer();
    }catch(err){ alert("Dit bestand is geen geldige revorm-back-up."); }
  };
  r.readAsText(f);
});
function deleteProjectData(pid){
  const pref=pid+"|";
  for(const k in state.entries){ if(k.indexOf(pref)===0) delete state.entries[k]; }
}
function flash(btn,msg){ const o=btn.textContent; btn.textContent=msg; setTimeout(()=>btn.textContent=o,1200); }

function seedIfEmpty(){
  if(stateIsEmpty()){
    const c=uid();
    state.clients.push({id:c,name:"Voorbeeld opdrachtgever"});
    state.projects.push({id:uid(),clientId:c,name:"Voorbeeld project",rate:95,archived:false});
    saveLocal();
  }
}
